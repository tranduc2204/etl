version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: pg_etl
    environment:
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: etl
      POSTGRES_DB: etl_db
    ports:
      - "5433:5432"

  airflow:
    image: apache/airflow:2.9.0
    container_name: airflow_etl
    ports:
      - "8080:8080"